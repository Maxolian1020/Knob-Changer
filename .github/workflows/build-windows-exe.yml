name: Build Windows EXE

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore .\VolumeRedirector\VolumeRedirector.csproj

      - name: Publish Windows EXE
        run: >
          dotnet publish .\VolumeRedirector\VolumeRedirector.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolumeRedirector-win-x64
          path: .\VolumeRedirector\bin\Release\net8.0-windows\win-x64\publish\VolumeRedirector.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = ".\VolumeRedirector\bin\Release\net8.0-windows\win-x64\publish\VolumeRedirector.exe"

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
          }

          gh release upload $tag $asset --clobber
