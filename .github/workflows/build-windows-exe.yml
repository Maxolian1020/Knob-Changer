name: Build Windows EXE

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore .\VolumeRedirector\VolumeRedirector.csproj

      - name: Publish Windows EXE
        run: >
          dotnet publish .\VolumeRedirector\VolumeRedirector.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolumeRedirector-win-x64
          path: .\VolumeRedirector\bin\Release\net8.0-windows\win-x64\publish\VolumeRedirector.exe
          if-no-files-found: error
